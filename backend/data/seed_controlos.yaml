          - "Relatório de scanning de vulnerabilidades"
          - "Registo de vulnerabilidades com estado de remediação"
        checks:
          - descricao: "Existe uma política de gestão de patches com SLAs definidos."
            obrigatorio: true
          - descricao: "É realizado scanning de vulnerabilidades nos sistemas críticos."
            obrigatorio: false
          - descricao: "Existe um registo de vulnerabilidades identificadas e respetivo estado."
            obrigatorio: true
          - descricao: "Os patches são testados antes de serem aplicados em produção."
            obrigatorio: false
          - descricao: "Aplicações de terceiros estão incluídas no processo de patches."
            obrigatorio: false
