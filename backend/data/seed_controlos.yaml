# =============================================================================
# Seed data — Domínios e Controlos UCF (Universal Control Framework)
# Baseado no CyFun / NIS2 / DL 125/2025 / QNCS 2026
#
# Estrutura por controlo:
#   codigo, dominio, titulo, descricao_simples, critico,
#   nivel_minimo_base/importante/essencial, ordem, mapeamento
#   niveis:
#     <1-5>:
#       descricao            ← o que significa este nível para este controlo
#       guia_implementacao   ← Medida de Cibersegurança (passos) para este nível
#       exemplos_evidencias  ← Critério de Verificação para este nível
#       checks:              ← indicadores verificáveis deste nível
#         - descricao: ...
#           obrigatorio: true|false
# =============================================================================

dominios:
  - codigo: ID
    nome: Identificar
    descricao: >
      Desenvolver uma compreensão organizacional para gerir o risco de cibersegurança
      nos sistemas, ativos, dados e capacidades.
    ordem: 1

  - codigo: PR
    nome: Proteger
    descricao: >
      Desenvolver e implementar salvaguardas adequadas para assegurar a entrega
      de serviços de infraestrutura crítica.
    ordem: 2

  - codigo: DE
    nome: Detetar
    descricao: >
      Desenvolver e implementar atividades adequadas para identificar a ocorrência
      de um evento de cibersegurança.
    ordem: 3

  - codigo: RS
    nome: Responder
    descricao: >
      Desenvolver e implementar atividades adequadas para agir em relação
      a um evento de cibersegurança detetado.
    ordem: 4

  - codigo: RC
    nome: Recuperar
    descricao: >
      Desenvolver e implementar atividades adequadas para manter planos de resiliência
      e repor capacidades e serviços afetados.
    ordem: 5

controlos:
  # ── IDENTIFICAR ────────────────────────────────────────────────────────────
  - codigo: ID.AM-01
    dominio: ID
    titulo: Inventário de hardware e software
    descricao_simples: >
      A organização mantém um registo atualizado de todos os equipamentos e programas
      informáticos utilizados no negócio.
    critico: false
    nivel_minimo_base: 2
    nivel_minimo_importante: 3
    nivel_minimo_essencial: 4
    ordem: 1
    mapeamento:
      iso27001: ["A.8.1"]
      nist_csf: ["ID.AM-1", "ID.AM-2"]
      dl125: ["Art.21º(2)(g)"]
    niveis:
      1:
        descricao: "Nenhum inventário formal existe. O conhecimento dos ativos é informal e baseado na memória."
        guia_implementacao:
          - "1. Identificar todos os equipamentos (computadores, servidores, dispositivos de rede, móveis)."
          - "2. Identificar todos os programas instalados nesses equipamentos."
          - "3. Criar uma folha de cálculo ou usar uma ferramenta de inventário."
          - "4. Registar: nome, função, sistema operativo, versão, responsável."
          - "5. Definir responsável por manter o inventário atualizado."
        exemplos_evidencias:
          - "Ficheiro Excel/Google Sheets com inventário de hardware e software"
          - "Screenshot de ferramenta de gestão de ativos (ex: Lansweeper, OCS Inventory)"
          - "Documento Word com lista de equipamentos e software aprovado"
        checks:
          - descricao: "Existe uma lista de todos os computadores e servidores em uso na organização."
            obrigatorio: true
          - descricao: "Existe uma lista do software instalado nos equipamentos principais."
            obrigatorio: true
          - descricao: "A lista inclui pelo menos: nome do equipamento, função e responsável."
            obrigatorio: true
          - descricao: "A lista está guardada num local acessível às pessoas responsáveis."
            obrigatorio: false
          - descricao: "Existe alguém designado como responsável por atualizar a lista."
            obrigatorio: false
      2:
        descricao: "Existe uma lista básica de equipamentos principais, atualizada manualmente quando necessário."
        guia_implementacao:
          - "1. Formalizar o inventário com campos de responsável, localização e data de aquisição."
          - "2. Definir um processo de atualização (ex: sempre que há entrada/saída de equipamento)."
          - "3. Incluir dispositivos móveis e equipamentos de escritório remoto."
          - "4. Categorizar por criticidade para o negócio."
          - "5. Documentar o software licenciado vs. gratuito/open-source."
        exemplos_evidencias:
          - "Inventário formalizado com responsável e data de última atualização"
          - "Procedimento escrito para atualizar o inventário em compras e abates"
          - "Categoria de criticidade atribuída a cada ativo"
        checks:
          - descricao: "O inventário inclui todos os dispositivos móveis (telemóveis, tablets) de uso profissional."
            obrigatorio: true
          - descricao: "O inventário tem uma data de última revisão documentada."
            obrigatorio: true
          - descricao: "O inventário indica a criticidade de cada ativo para o negócio."
            obrigatorio: false
          - descricao: "Existe um processo definido para registar novas aquisições no inventário."
            obrigatorio: false
          - descricao: "O inventário está sincronizado com o processo de compras."
            obrigatorio: false
      3:
        descricao: "Inventário completo e estruturado, atualizado trimestralmente, com campos de responsável e versão."
        guia_implementacao:
          - "1. Implementar uma ferramenta de inventário automatizada (ex: OCS Inventory, Snipe-IT)."
          - "2. Incluir ativos cloud e serviços SaaS no inventário."
          - "3. Estabelecer processo de reconciliação trimestral."
          - "4. Integrar inventário com processo de gestão de mudanças."
          - "5. Reportar métricas de cobertura do inventário à gestão."
        exemplos_evidencias:
          - "Ferramenta de inventário automático com relatório de cobertura"
          - "Relatório trimestral de revisão e reconciliação do inventário"
          - "Inventário de serviços cloud e SaaS aprovados"
        checks:
          - descricao: "É utilizada uma ferramenta de inventário automatizado."
            obrigatorio: true
          - descricao: "O inventário inclui ativos cloud e serviços SaaS."
            obrigatorio: true
          - descricao: "O inventário é revisto e reconciliado trimestralmente."
            obrigatorio: true
          - descricao: "Existem métricas de cobertura do inventário (% de ativos conhecidos)."
            obrigatorio: false
          - descricao: "O inventário está integrado com o processo de gestão de mudanças."
            obrigatorio: false
      4:
        descricao: "Inventário integrado com processos de aquisição — qualquer novo ativo é registado automaticamente."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []
      5:
        descricao: "Inventário automático em tempo real, com alertas de desvios e integração com gestão de vulnerabilidades."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []

  - codigo: ID.AM-02
    dominio: ID
    titulo: Classificação e gestão de ativos de informação
    descricao_simples: >
      A organização identifica e classifica os dados e informações críticos para o negócio,
      sabendo onde estão guardados e quem pode aceder.
    critico: false
    nivel_minimo_base: 2
    nivel_minimo_importante: 3
    nivel_minimo_essencial: 4
    ordem: 2
    mapeamento:
      iso27001: ["A.8.2"]
      nist_csf: ["ID.AM-5"]
      dl125: ["Art.21º(2)(g)"]
    niveis:
      1:
        descricao: "Sem classificação formal. Todos os dados são tratados da mesma forma."
        guia_implementacao:
          - "1. Listar os tipos de dados que a organização processa (dados de clientes, financeiros, contratos, etc.)."
          - "2. Classificar por criticidade: público, interno, confidencial, secreto."
          - "3. Identificar onde cada tipo de dado está guardado (servidor, cloud, email, papel)."
          - "4. Definir quem pode aceder a cada classificação."
          - "5. Comunicar a política de classificação a todos os colaboradores."
        exemplos_evidencias:
          - "Documento de política de classificação de informação"
          - "Mapa de fluxos de dados ou registo de tratamento de dados"
          - "Inventário de repositórios de dados com classificação atribuída"
        checks:
          - descricao: "Existe uma lista dos principais tipos de dados que a organização utiliza (ex: dados de clientes, financeiros)."
            obrigatorio: true
          - descricao: "Cada tipo de dado tem uma classificação de sensibilidade (ex: confidencial, interno, público)."
            obrigatorio: true
          - descricao: "É sabido onde estão guardados os dados mais sensíveis da organização."
            obrigatorio: true
          - descricao: "Existe um documento ou email que comunica as regras básicas de manuseamento de dados aos colaboradores."
            obrigatorio: false
          - descricao: "Existe um responsável pela gestão dos dados sensíveis."
            obrigatorio: false
      2:
        descricao: "Classificação informal por tipo (ex: 'dados de clientes são confidenciais')."
        guia_implementacao:
          - "1. Formalizar a política de classificação em documento aprovado pela gestão."
          - "2. Etiquetar fisicamente/digitalmente documentos com a sua classificação."
          - "3. Definir regras de manuseamento por nível (quem pode aceder, como partilhar, como destruir)."
          - "4. Mapear os fluxos de dados entre sistemas."
          - "5. Garantir que contratos de confidencialidade existem com parceiros que acedem a dados sensíveis."
        exemplos_evidencias:
          - "Política de classificação formalizada e assinada pela gestão"
          - "Etiquetas de classificação em documentos físicos e digitais"
          - "NDAs/contratos de confidencialidade com parceiros"
        checks:
          - descricao: "Existe uma política de classificação de informação documentada e aprovada."
            obrigatorio: true
          - descricao: "Os documentos sensíveis estão etiquetados com o nível de classificação."
            obrigatorio: false
          - descricao: "Existem regras de manuseamento definidas para cada nível de classificação."
            obrigatorio: true
          - descricao: "O fluxo de dados sensíveis entre sistemas está mapeado."
            obrigatorio: false
          - descricao: "Parceiros com acesso a dados sensíveis assinaram NDA ou cláusulas de confidencialidade."
            obrigatorio: false
      3:
        descricao: "Política de classificação documentada com 3-4 categorias e procedimentos de manuseamento."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []
      4:
        descricao: "Classificação implementada em sistemas — etiquetagem automática de documentos."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []
      5:
        descricao: "Gestão de ciclo de vida completa — criação, uso, arquivo e destruição com controlo automático."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []

  - codigo: ID.GV-01
    dominio: ID
    titulo: Política de segurança da informação
    descricao_simples: >
      A organização tem um documento escrito que define as regras de segurança
      que todos os colaboradores devem seguir.
    critico: true
    nivel_minimo_base: 2
    nivel_minimo_importante: 3
    nivel_minimo_essencial: 4
    ordem: 3
    mapeamento:
      iso27001: ["A.5.1"]
      nist_csf: ["ID.GV-1"]
      dl125: ["Art.21º(2)(a)"]
    niveis:
      1:
        descricao: "Sem política escrita. Regras comunicadas verbalmente ou por email ocasional."
        guia_implementacao:
          - "1. Redigir uma política de segurança simples e clara (1-2 páginas)."
          - "2. Incluir: uso aceitável de equipamentos, passwords, email, dispositivos móveis, redes."
          - "3. Obter aprovação da gestão de topo."
          - "4. Distribuir e obter confirmação de leitura de todos os colaboradores."
          - "5. Rever anualmente ou quando existirem mudanças significativas."
        exemplos_evidencias:
          - "Documento de Política de Segurança da Informação assinado pela gestão"
          - "Email de distribuição aos colaboradores com assinatura de recebimento"
          - "Registo de formação onde a política foi apresentada"
        checks:
          - descricao: "Existe um documento escrito de política de segurança da informação."
            obrigatorio: true
          - descricao: "A política foi aprovada pela gestão de topo."
            obrigatorio: true
          - descricao: "A política foi distribuída a todos os colaboradores."
            obrigatorio: true
          - descricao: "A política inclui regras de uso de email e internet."
            obrigatorio: false
          - descricao: "A política inclui regras sobre passwords."
            obrigatorio: false
      2:
        descricao: "Política básica escrita e aprovada, distribuída aos colaboradores."
        guia_implementacao:
          - "1. Expandir a política com capítulos específicos para cada domínio (acessos, incidentes, backups)."
          - "2. Criar um processo formal de revisão anual com registo de alterações."
          - "3. Obter confirmação escrita de leitura e compreensão de todos os colaboradores."
          - "4. Criar versão simplificada para onboarding de novos colaboradores."
          - "5. Alinhar a política com o registo de tratamento de dados (RGPD)."
        exemplos_evidencias:
          - "Política de segurança com histórico de versões e revisão anual registada"
          - "Declarações de confirmação de leitura assinadas por todos os colaboradores"
          - "Módulo de segurança no processo de onboarding"
        checks:
          - descricao: "A política tem histórico de versões e data de última revisão."
            obrigatorio: true
          - descricao: "Existe confirmação escrita de leitura de todos os colaboradores ativos."
            obrigatorio: true
          - descricao: "A política inclui capítulo sobre resposta a incidentes."
            obrigatorio: false
          - descricao: "Novos colaboradores recebem a política no processo de onboarding."
            obrigatorio: false
          - descricao: "A política está alinhada com o registo de tratamento de dados."
            obrigatorio: false
      3:
        descricao: "Política completa, atualizada anualmente, com registo de confirmação de todos."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []
      4:
        descricao: "Política integrada no onboarding, com testes de compreensão e métricas de conformidade."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []
      5:
        descricao: "Política dinâmica, atualizada em tempo real com base em incidentes, normas e contexto de risco."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []

  - codigo: ID.RA-01
    dominio: ID
    titulo: Identificação e avaliação de riscos de cibersegurança
    descricao_simples: >
      A organização identifica os principais riscos de segurança que podem afetar o negócio
      e avalia a sua probabilidade e impacto.
    critico: false
    nivel_minimo_base: 2
    nivel_minimo_importante: 3
    nivel_minimo_essencial: 4
    ordem: 4
    mapeamento:
      iso27001: ["A.6.1", "A.8.3"]
      nist_csf: ["ID.RA-1", "ID.RA-5"]
      dl125: ["Art.21º(2)(a)"]
    niveis:
      1:
        descricao: "Sem avaliação de riscos formal. Riscos tratados reactivamente quando ocorrem."
        guia_implementacao:
          - "1. Realizar uma sessão de identificação de riscos com os responsáveis de cada área."
          - "2. Para cada risco: descrever a ameaça, o ativo afetado, a probabilidade e o impacto."
          - "3. Criar uma matriz de risco simples (probabilidade × impacto)."
          - "4. Priorizar os 5-10 riscos mais significativos."
          - "5. Definir medidas de mitigação para cada risco prioritário."
        exemplos_evidencias:
          - "Registo de riscos (folha de cálculo ou documento)"
          - "Matriz de risco com classificação probabilidade × impacto"
          - "Atas de reunião de avaliação de riscos"
        checks:
          - descricao: "Existe uma lista dos principais riscos de segurança identificados."
            obrigatorio: true
          - descricao: "Cada risco tem uma avaliação de impacto (alto/médio/baixo)."
            obrigatorio: true
          - descricao: "Existe pelo menos uma medida de mitigação definida para os riscos de alto impacto."
            obrigatorio: true
          - descricao: "A avaliação de riscos foi revisada nos últimos 12 meses."
            obrigatorio: false
          - descricao: "A avaliação de riscos foi apresentada à gestão de topo."
            obrigatorio: false
      2:
        descricao: "Lista informal de principais riscos identificada pela gestão."
        guia_implementacao:
          - "1. Formalizar a avaliação de riscos com metodologia documentada (ex: FAIR, ISO 27005 simplificada)."
          - "2. Incluir riscos de terceiros e da cadeia de abastecimento."
          - "3. Criar um plano de tratamento de riscos com ações, responsáveis e prazos."
          - "4. Rever a avaliação semestralmente ou após eventos significativos."
          - "5. Reportar o estado dos riscos à administração."
        exemplos_evidencias:
          - "Registos de riscos com metodologia documentada"
          - "Plano de tratamento de riscos com responsáveis e prazos"
          - "Relatório semestral de revisão de riscos apresentado à direção"
        checks:
          - descricao: "A avaliação de riscos usa uma metodologia documentada e consistente."
            obrigatorio: true
          - descricao: "O registo de riscos inclui riscos de terceiros e fornecedores."
            obrigatorio: false
          - descricao: "Existe um plano de tratamento de riscos com responsáveis e prazos."
            obrigatorio: true
          - descricao: "A avaliação de riscos é revista pelo menos semestralmente."
            obrigatorio: false
          - descricao: "O estado dos riscos é reportado à gestão de topo em reunião periódica."
            obrigatorio: false
      3:
        descricao: "Avaliação de riscos formal com matriz documentada, revista anualmente."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []
      4:
        descricao: "Avaliação de riscos integrada em decisões de negócio e investimentos em TI."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []
      5:
        descricao: "Gestão de riscos contínua com reavaliação automática baseada em dados de ameaças."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []

  - codigo: ID.SC-01
    dominio: ID
    titulo: Gestão de segurança da cadeia de abastecimento
    descricao_simples: >
      A organização conhece os fornecedores e parceiros com acesso aos seus sistemas
      e dados, e avalia os riscos que representam.
    critico: false
    nivel_minimo_base: 2
    nivel_minimo_importante: 3
    nivel_minimo_essencial: 4
    ordem: 5
    mapeamento:
      iso27001: ["A.15.1", "A.15.2"]
      nist_csf: ["ID.SC-1", "ID.SC-3"]
      dl125: ["Art.21º(2)(d)"]
    niveis:
      1:
        descricao: "Sem controlo de fornecedores. Acesso concedido sem avaliação de segurança."
        guia_implementacao:
          - "1. Listar todos os fornecedores com acesso a sistemas ou dados da organização."
          - "2. Para cada fornecedor: identificar o tipo de acesso e os dados a que têm acesso."
          - "3. Verificar que os contratos incluem cláusulas de proteção de dados (DPA se RGPD aplicável)."
          - "4. Enviar questionário de segurança aos fornecedores críticos."
          - "5. Documentar os resultados e riscos identificados."
        exemplos_evidencias:
          - "Lista de fornecedores com tipo de acesso e dados envolvidos"
          - "Cópias de contratos com cláusulas de segurança/DPA"
          - "Questionários de segurança respondidos por fornecedores"
        checks:
          - descricao: "Existe uma lista dos fornecedores com acesso a sistemas ou dados da organização."
            obrigatorio: true
          - descricao: "Os contratos com fornecedores críticos incluem cláusulas de segurança/confidencialidade."
            obrigatorio: true
          - descricao: "É sabido que tipo de dados cada fornecedor crítico pode aceder."
            obrigatorio: true
          - descricao: "Existe um processo para revogar o acesso quando um fornecedor termina a relação."
            obrigatorio: false
          - descricao: "Os fornecedores críticos foram informados das políticas de segurança da organização."
            obrigatorio: false
      2:
        descricao: "Lista de fornecedores críticos identificada, contratos com cláusulas básicas."
        guia_implementacao:
          - "1. Classificar fornecedores por criticidade (críticos, importantes, regulares)."
          - "2. Exigir questionários de segurança a fornecedores críticos."
          - "3. Garantir que todos os Acordos de Processamento de Dados (DPA/Art.28 RGPD) estão assinados."
          - "4. Definir requisitos mínimos de segurança contratuais para todos os fornecedores."
          - "5. Rever a lista de fornecedores anualmente."
        exemplos_evidencias:
          - "Classificação de fornecedores por criticidade"
          - "DPAs assinados com todos os processadores de dados"
          - "Questionários de segurança de fornecedores críticos com avaliação de risco"
        checks:
          - descricao: "Os fornecedores estão classificados por criticidade."
            obrigatorio: true
          - descricao: "Todos os fornecedores que processam dados pessoais têm DPA assinado."
            obrigatorio: true
          - descricao: "Existe um processo de avaliação de segurança antes de contratar novos fornecedores críticos."
            obrigatorio: false
          - descricao: "A lista de fornecedores é revista anualmente."
            obrigatorio: false
          - descricao: "Os contratos incluem o direito de auditoria de segurança."
            obrigatorio: false
      3:
        descricao: "Política de segurança de fornecedores documentada, avaliação anual."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []
      4:
        descricao: "Auditorias de terceiros a fornecedores críticos, scorecard de segurança."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []
      5:
        descricao: "Monitorização contínua de fornecedores, integração de threat intelligence."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []

  # ── PROTEGER ───────────────────────────────────────────────────────────────
  - codigo: PR.AC-01
    dominio: PR
    titulo: Gestão de identidades e controlo de acessos
    descricao_simples: >
      Apenas as pessoas certas têm acesso aos sistemas e dados certos,
      com as permissões mínimas necessárias para o seu trabalho.
    critico: true
    nivel_minimo_base: 2
    nivel_minimo_importante: 3
    nivel_minimo_essencial: 4
    ordem: 1
    mapeamento:
      iso27001: ["A.9.1", "A.9.2", "A.9.4"]
      nist_csf: ["PR.AC-1", "PR.AC-4"]
      dl125: ["Art.21º(2)(e)"]
    niveis:
      1:
        descricao: "Contas partilhadas, sem controlo formal de acessos."
        guia_implementacao:
          - "1. Criar uma conta individual para cada colaborador — nunca partilhar contas."
          - "2. Definir permissões baseadas na função (princípio do menor privilégio)."
          - "3. Rever trimestralmente quem tem acesso a quê."
          - "4. Revogar imediatamente o acesso quando um colaborador sai."
          - "5. Implementar processo formal de criação/modificação/revogação de acessos."
        exemplos_evidencias:
          - "Lista de utilizadores de sistemas com permissões atribuídas"
