  # ── RECUPERAR ──────────────────────────────────────────────────────────────
  - codigo: RC.RP-01
    dominio: RC
    titulo: Plano de recuperação e continuidade de negócio
    descricao_simples: >
      A organização tem um plano para retomar as operações essenciais
      o mais rapidamente possível após um incidente grave.
    critico: true
    nivel_minimo_base: 2
    nivel_minimo_importante: 3
    nivel_minimo_essencial: 4
    ordem: 1
    mapeamento:
      iso27001: ["A.17.1", "A.17.2"]
      nist_csf: ["RC.RP-1"]
      dl125: ["Art.21º(2)(c)"]
    niveis:
      1:
        descricao: "Sem plano de recuperação. Restauro ad hoc após incidentes."
        guia_implementacao:
          - "1. Identificar os processos e sistemas críticos sem os quais o negócio não funciona."
          - "2. Definir RTOs (Recovery Time Objectives) — em quanto tempo devem estar recuperados."
          - "3. Definir RPOs (Recovery Point Objectives) — qual a tolerância máxima à perda de dados."
          - "4. Documentar os passos de recuperação para cada sistema crítico."
          - "5. Testar o plano anualmente com um exercício real de restauro."
        exemplos_evidencias:
          - "Plano de Continuidade de Negócio documentado"
          - "Tabela de sistemas críticos com RTO e RPO definidos"
          - "Registo de teste de recuperação (restauro de backup)"
        checks:
          - descricao: "Existe um plano documentado de recuperação após incidente."
            obrigatorio: true
          - descricao: "Os sistemas críticos para o negócio estão identificados."
            obrigatorio: true
          - descricao: "Existe um objetivo definido de em quanto tempo os sistemas críticos devem estar recuperados."
            obrigatorio: true
          - descricao: "O plano de recuperação foi testado nos últimos 12 meses com um exercício real."
            obrigatorio: false
          - descricao: "Existem backups offline dos sistemas críticos disponíveis para recuperação."
            obrigatorio: false
      2:
        descricao: "Lista de sistemas críticos identificada, backups regulares."
        guia_implementacao:
          - "1. Formalizar o plano de continuidade de negócio (BCP) com procedimentos detalhados."
          - "2. Definir e documentar RTOs e RPOs para cada sistema crítico."
          - "3. Realizar testes de restauro completo pelo menos trimestralmente."
          - "4. Asegurar acesso a meios de recuperação alternativos (hardware de reserva, cloud)."
          - "5. Comunicar o plano a todos os responsáveis e testar em exercício."
        exemplos_evidencias:
          - "BCP documentado com RTOs e RPOs por sistema"
          - "Resultados de testes de restauro trimestral"
          - "Inventário de meios de recuperação alternativos"
        checks:
          - descricao: "O plano de continuidade inclui RTOs e RPOs documentados por sistema crítico."
            obrigatorio: true
          - descricao: "São realizados testes de restauro pelo menos trimestralmente."
            obrigatorio: true
          - descricao: "Existem meios alternativos de recuperação documentados (hardware reserva, cloud)."
            obrigatorio: false
          - descricao: "O plano foi comunicado a todos os responsáveis."
            obrigatorio: false
          - descricao: "Foi realizado um exercício de recuperação completo nos últimos 12 meses."
            obrigatorio: false
      3:
        descricao: "BCP documentado com RTO/RPO, testado anualmente."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []
      4:
        descricao: "DRP automatizado, testes de failover regulares, hot standby para sistemas críticos."
