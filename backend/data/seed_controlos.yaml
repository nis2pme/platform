  - codigo: DE.CM-01
    dominio: DE
    titulo: Monitorização contínua de segurança
    descricao_simples: >
      A organização monitoriza os seus sistemas para detetar atividades suspeitas
      e possíveis incidentes de segurança.
    critico: false
    nivel_minimo_base: 2
    nivel_minimo_importante: 3
    nivel_minimo_essencial: 4
