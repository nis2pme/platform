  - codigo: PR.AT-01
    dominio: PR
    titulo: Formação e consciencialização em cibersegurança
    descricao_simples: >
      Todos os colaboradores recebem formação regular sobre cibersegurança,
      incluindo como reconhecer ameaças como phishing.
    critico: true
    nivel_minimo_base: 2
    nivel_minimo_importante: 3
    nivel_minimo_essencial: 4
    ordem: 5
    mapeamento:
      iso27001: ["A.7.2"]
      nist_csf: ["PR.AT-1", "PR.AT-2"]
      dl125: ["Art.21º(2)(g)"]
    niveis:
      1:
        descricao: "Sem formação formal. Colaboradores não sabem reconhecer ameaças básicas."
        guia_implementacao:
          - "1. Realizar formação anual de consciencialização para todos os colaboradores."
          - "2. Incluir: phishing, passwords seguras, uso de dispositivos pessoais, relatório de incidentes."
          - "3. Incluir módulo de segurança no onboarding de novos colaboradores."
          - "4. Realizar simulações de phishing periódicas."
          - "5. Manter registo de participação nas formações."
        exemplos_evidencias:
          - "Registo de presenças em formação de cibersegurança"
          - "Material de formação utilizado (apresentação, vídeo)"
          - "Resultados de simulação de phishing com evidência de formação adicional"
        checks:
          - descricao: "Todos os colaboradores receberam pelo menos uma formação de cibersegurança nos últimos 12 meses."
            obrigatorio: true
          - descricao: "A formação incluiu como reconhecer emails de phishing."
            obrigatorio: true
          - descricao: "A formação incluiu regras de passwords seguras."
            obrigatorio: true
          - descricao: "Novos colaboradores recebem formação de segurança no onboarding."
            obrigatorio: false
          - descricao: "Existe registo (presença, certificado) das formações realizadas."
            obrigatorio: false
      2:
        descricao: "Formação anual pontual sobre tópicos básicos."
        guia_implementacao:
          - "1. Estruturar um programa formal de consciencialização com calendário anual."
          - "2. Realizar pelo menos uma simulação de phishing por ano e medir resultados."
          - "3. Criar conteúdos diferenciados por função (admins, gestão, utilizadores gerais)."
          - "4. Estabelecer métricas de eficácia (ex: taxa de cliques em phishing simulado)."
          - "5. Registar conclusão de formação como obrigatório para toda a organização."
        exemplos_evidencias:
          - "Programa anual de formação em cibersegurança com calendário"
          - "Resultados de campanha de phishing simulado com taxa de cliques"
          - "Relatório de conclusão da formação por colaborador"
        checks:
          - descricao: "Existe um programa formal de consciencialização com calendário anual."
            obrigatorio: true
          - descricao: "É realizada pelo menos uma simulação de phishing por ano."
            obrigatorio: true
          - descricao: "Existem métricas de eficácia medidas periodicamente."
            obrigatorio: false
          - descricao: "O conteúdo de formação é diferenciado por função."
            obrigatorio: false
          - descricao: "A conclusão da formação é registada e reportada à gestão."
