  - codigo: PR.AC-02
    dominio: PR
    titulo: Autenticação de múltiplos fatores (MFA)
    descricao_simples: >
      Para aceder a sistemas críticos, para além da password é necessária uma segunda
      verificação (ex: código no telemóvel).
    critico: true
    nivel_minimo_base: 2
    nivel_minimo_importante: 3
    nivel_minimo_essencial: 4
    ordem: 2
    mapeamento:
      iso27001: ["A.9.4"]
      nist_csf: ["PR.AC-7"]
      dl125: ["Art.21º(2)(j)"]
    niveis:
      1:
        descricao: "Sem MFA em nenhum sistema."
        guia_implementacao:
          - "1. Identificar os sistemas críticos e os acessos remotos."
          - "2. Ativar MFA em email, VPN, sistemas de gestão e acesso remoto."
          - "3. Obrigar MFA para administradores de sistemas."
          - "4. Escolher um método: app autenticadora (Google Authenticator, Authy), SMS, hardware token."
          - "5. Treinar os colaboradores na utilização do MFA."
        exemplos_evidencias:
          - "Screenshot de configuração de MFA em sistemas críticos"
          - "Política de acesso remoto obrigando MFA"
          - "Registo de utilizadores com MFA ativado"
        checks:
          - descricao: "MFA está ativado no email corporativo dos administradores."
            obrigatorio: true
          - descricao: "MFA está ativado no acesso remoto (VPN ou Remote Desktop) se usado."
            obrigatorio: true
          - descricao: "Os administradores de sistemas usam MFA para aceder a painéis de gestão."
            obrigatorio: true
          - descricao: "Existe documentação de como ativar e usar o MFA para os colaboradores."
            obrigatorio: false
          - descricao: "Existe um processo de recuperação de acesso quando o MFA falha."
            obrigatorio: false
      2:
        descricao: "MFA ativado em email e acesso remoto para administradores."
        guia_implementacao:
          - "1. Alargar o MFA a todos os utilizadores em sistemas de email e acesso remoto."
          - "2. Eliminar o SMS como único fator (vulnerável a SIM swapping) — migrar para app autenticadora."
          - "3. Documentar o processo de recuperação de MFA para utilizadores bloqueados."
          - "4. Inventariar todos os sistemas que ainda não têm MFA ativado."
          - "5. Definir prazo para MFA obrigatório para todos os colaboradores."
        exemplos_evidencias:
          - "Relatório de cobertura MFA (% de utilizadores com MFA ativo)"
          - "Política de password e MFA actualizada"
          - "Processo documentado de recuperação de MFA"
        checks:
          - descricao: "MFA está ativado para todos os utilizadores no email corporativo."
            obrigatorio: true
          - descricao: "MFA usa app autenticadora (não apenas SMS)."
            obrigatorio: false
          - descricao: "Existe um relatório de cobertura do MFA (quem tem, quem não tem)."
            obrigatorio: true
          - descricao: "O processo de recuperação de MFA está documentado e é seguro."
            obrigatorio: false
          - descricao: "Existe um prazo definido para MFA obrigatório em todos os sistemas."
            obrigatorio: false
      3:
        descricao: "MFA obrigatório para todos os utilizadores em sistemas críticos e acesso remoto."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []
      4:
        descricao: "MFA adaptativo (exige MFA adicional em contextos de risco elevado)."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []
      5:
        descricao: "Passwordless authentication, biometria, hardware tokens para todos os acessos privilegiados."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []

  - codigo: PR.DS-01
    dominio: PR
    titulo: Proteção de dados em repouso e em trânsito
    descricao_simples: >
      Os dados sensíveis estão protegidos por encriptação, tanto quando estão guardados
      como quando são transmitidos pela internet.
    critico: false
    nivel_minimo_base: 2
    nivel_minimo_importante: 3
    nivel_minimo_essencial: 4
    ordem: 3
    mapeamento:
      iso27001: ["A.10.1", "A.13.2"]
      nist_csf: ["PR.DS-1", "PR.DS-2"]
      dl125: ["Art.21º(2)(h)"]
    niveis:
      1:
        descricao: "Sem encriptação em nenhum sistema. Dados transmitidos em claro."
        guia_implementacao:
          - "1. Garantir que o site e sistemas web usam HTTPS (certificado SSL/TLS)."
          - "2. Cifrar portáteis e pen drives com dados sensíveis (BitLocker, FileVault)."
          - "3. Usar VPN para acessos remotos a sistemas internos."
          - "4. Garantir que backups estão encriptados."
          - "5. Verificar que email com dados sensíveis usa canal seguro (TLS)."
        exemplos_evidencias:
          - "Screenshot de certificado SSL/TLS ativo no site"
          - "Política de encriptação de dispositivos portáteis"
          - "Screenshot de configuração de BitLocker ou FileVault nos portáteis"
        checks:
          - descricao: "O site e sistemas web usam HTTPS com certificado válido."
            obrigatorio: true
          - descricao: "Os portáteis da organização têm encriptação de disco ativa (ex: BitLocker, FileVault)."
            obrigatorio: true
          - descricao: "Pen drives e discos externos com dados sensíveis são encriptados."
            obrigatorio: false
          - descricao: "Os backups são guardados de forma encriptada."
            obrigatorio: false
          - descricao: "As comunicações de acesso remoto (VPN) são encriptadas."
            obrigatorio: false
      2:
        descricao: "HTTPS no site e email TLS. Sem encriptação de dispositivos."
        guia_implementacao:
          - "1. Implementar política de encriptação de dispositivos portáteis em todos os portáteis."
          - "2. Verificar que backups em disco externo ou cloud estão encriptados."
          - "3. Criar inventário de sistemas sem encriptação ativa."
          - "4. Definir prazo para implementação de encriptação em todos os sistemas críticos."
          - "5. Testar regularmente a validade dos certificados TLS."
        exemplos_evidencias:
          - "Inventário de laptops com estado da encriptação de disco"
          - "Configuração de backups encriptados com evidência"
          - "Calendário de renovação de certificados TLS"
        checks:
          - descricao: "Todos os portáteis têm encriptação de disco ativa."
            obrigatorio: true
          - descricao: "Os backups estão encriptados (em disco externo e/ou cloud)."
            obrigatorio: true
          - descricao: "Existe uma política formal de encriptação aprovada."
            obrigatorio: false
          - descricao: "Os certificados TLS têm monitorização de expiração configurada."
            obrigatorio: false
          - descricao: "Existe um inventário de sistemas com estado de encriptação documentado."
            obrigatorio: false
      3:
        descricao: "HTTPS + encriptação de portáteis + backups encriptados."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []
      4:
        descricao: "Encriptação end-to-end em comunicações, gestão centralizada de chaves."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []
      5:
        descricao: "Encriptação por defeito em todos os dados, HSM, rotação automática de chaves."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []

  - codigo: PR.IP-01
    dominio: PR
    titulo: Gestão de patches e vulnerabilidades
    descricao_simples: >
      A organização mantém os sistemas e software atualizados para corrigir
      vulnerabilidades de segurança conhecidas.
    critico: true
    nivel_minimo_base: 2
    nivel_minimo_importante: 3
    nivel_minimo_essencial: 4
    ordem: 4
    mapeamento:
      iso27001: ["A.12.6"]
      nist_csf: ["PR.IP-12"]
      dl125: ["Art.21º(2)(e)"]
    niveis:
      1:
        descricao: "Sem processo de patches. Sistemas desatualizados por meses ou anos."
        guia_implementacao:
          - "1. Ativar atualizações automáticas em todos os sistemas operativos."
          - "2. Definir uma janela de manutenção mensal para aplicar patches manuais."
          - "3. Verificar mensalmente se existem atualizações pendentes nos sistemas críticos."
          - "4. Manter registo das versões instaladas e data da última atualização."
          - "5. Incluir software de terceiros (Office, browsers, etc.) no processo de patches."
        exemplos_evidencias:
          - "Screenshot de configuração de atualizações automáticas nos sistemas"
          - "Registo mensal de verificação de patches"
          - "Lista de sistemas com versão e data da última atualização"
        checks:
          - descricao: "As atualizações automáticas estão ativas nos sistemas operativos dos equipamentos."
            obrigatorio: true
          - descricao: "Os sistemas críticos foram atualizados nos últimos 30 dias."
            obrigatorio: true
          - descricao: "Existe alguém responsável por verificar e aplicar atualizações de segurança."
            obrigatorio: true
          - descricao: "O antivírus/endpoint protection está atualizado em todos os equipamentos."
            obrigatorio: false
          - descricao: "Existe um registo das últimas atualizações aplicadas nos sistemas críticos."
            obrigatorio: false
      2:
        descricao: "Atualizações automáticas ativas. Patches críticos aplicados quando lembrado."
        guia_implementacao:
          - "1. Formalizar o processo de patches com SLA por criticidade (ex: críticos em 7 dias, altos em 30 dias)."
          - "2. Implementar uma ferramenta de scanning de vulnerabilidades."
          - "3. Incluir aplicações de terceiros e plugins no processo de gestão de patches."
          - "4. Criar um registo de vulnerabilidades identificadas e estado de remediação."
          - "5. Testar patches em ambiente de teste antes de aplicar em produção."
        exemplos_evidencias:
