  - codigo: DE.CM-02
    dominio: DE
    titulo: Deteção de intrusões e anomalias de rede
    descricao_simples: >
      A organização tem mecanismos para detetar acessos não autorizados
      à sua rede e sistemas.
    critico: false
    nivel_minimo_base: 2
    nivel_minimo_importante: 3
    nivel_minimo_essencial: 4
    ordem: 2
    mapeamento:
      iso27001: ["A.13.1"]
      nist_csf: ["DE.CM-1", "DE.CM-6"]
      dl125: ["Art.21º(2)(b)"]
    niveis:
      1:
        descricao: "Sem firewall ou deteção de intrusões."
        guia_implementacao:
          - "1. Verificar os logs do router/firewall periodicamente."
          - "2. Configurar a firewall para bloquear tráfego não autorizado."
          - "3. Segmentar a rede WiFi de convidados da rede corporativa."
          - "4. Revisar mensalmente os dispositivos ligados à rede."
          - "5. Configurar alertas para ligações de localizações ou horários incomuns."
        exemplos_evidencias:
          - "Screenshot de configuração de firewall"
          - "Registo de revisão mensal de dispositivos na rede"
          - "Configuração de rede WiFi separada para convidados"
        checks:
          - descricao: "Existe uma firewall ativa entre a rede interna e a internet."
            obrigatorio: true
          - descricao: "A rede WiFi de convidados é separada da rede interna corporativa."
            obrigatorio: true
          - descricao: "Os logs da firewall/router são verificados periodicamente."
            obrigatorio: false
          - descricao: "A lista de dispositivos ligados à rede é revista mensalmente."
            obrigatorio: false
          - descricao: "Existe alguém responsável por monitorizar a segurança da rede."
            obrigatorio: true
      2:
        descricao: "Firewall básica, rede WiFi de convidados separada."
        guia_implementacao:
          - "1. Implementar regras de firewall com política de deny-by-default."
          - "2. Realizar scanning periódico de portas abertas e serviços expostos."
          - "3. Segmentar a rede interna por função (servidores, workstations, IoT)."
          - "4. Monitorizar tráfego de saída para detetar exfiltração de dados."
          - "5. Configurar alertas para ligações a domínios maliciosos conhecidos."
        exemplos_evidencias:
          - "Ruleset documentado da firewall com política deny-by-default"
          - "Relatório de port scanning com portas abertas justificadas"
          - "Diagrama de segmentação de rede"
        checks:
