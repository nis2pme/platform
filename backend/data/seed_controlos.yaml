          - "2. Instalar e configurar antivírus/EDR em todos os equipamentos."
          - "3. Configurar alertas para tentativas de login falhadas repetidas."
          - "4. Verificar semanalmente se existem alertas de segurança por tratar."
          - "5. Manter os logs por pelo menos 12 meses."
        exemplos_evidencias:
