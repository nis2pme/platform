        exemplos_evidencias: []
        checks: []
      5:
        descricao: "Backup contínuo (CDP), restauro instantâneo, zero RPO para sistemas críticos."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []

  - codigo: RC.IM-01
    dominio: RC
    titulo: Melhorias pós-incidente e lições aprendidas
    descricao_simples: >
      Após cada incidente, a organização analisa o que aconteceu e melhora
      os seus processos para evitar repetições.
    critico: false
    nivel_minimo_base: 1
    nivel_minimo_importante: 2
    nivel_minimo_essencial: 3
    ordem: 3
    mapeamento:
      iso27001: ["A.16.1"]
      nist_csf: ["RC.IM-1", "RC.IM-2"]
      dl125: ["Art.21º(2)(a)"]
    niveis:
      1:
        descricao: "Sem análise pós-incidente. Mesmos erros repetem-se."
        guia_implementacao:
          - "1. Após cada incidente, realizar uma reunião de lições aprendidas."
          - "2. Documentar: o que aconteceu, por que aconteceu, impacto, ações de melhoria."
          - "3. Atualizar planos, procedimentos e controlos com base nas lições."
          - "4. Comunicar as lições relevantes a todos os colaboradores."
          - "5. Verificar na próxima revisão se as ações de melhoria foram implementadas."
        exemplos_evidencias:
          - "Relatório de pós-incidente com lições aprendidas"
          - "Lista de melhorias implementadas após incidentes"
          - "Ata de reunião de revisão pós-incidente"
        checks:
          - descricao: "Após incidentes, é feita uma análise básica do que aconteceu e por quê."
            obrigatorio: true
          - descricao: "As conclusões desta análise são documentadas."
            obrigatorio: false
          - descricao: "São definidas ações de melhoria para evitar recorrência."
            obrigatorio: true
          - descricao: "As lições relevantes são comunicadas aos colaboradores afetados."
            obrigatorio: false
          - descricao: "Existe um registo dos incidentes passados com a evolução do estado de resolução."
            obrigatorio: false
      2:
        descricao: "Discussão informal após incidentes significativos."
        guia_implementacao:
          - "1. Formalizar o processo de post-mortem com template e prazo definidos (ex: 5 dias após o incidente)."
          - "2. Criar um registo centralizado de incidentes com estado das acções de melhoria."
          - "3. Incluir a revisão de incidentes na agenda das reuniões de gestão."
          - "4. Medir o tempo de resolução e acompanhar a execução das ações."
          - "5. Partilhar lições relevantes com outros departamentos ou com a indústria."
        exemplos_evidencias:
          - "Template de post-mortem formalizado e utilizado"
          - "Registo de incidentes com estado de acções de melhoria"
          - "Ata de reunião de gestão onde incidentes foram revistos"
        checks:
          - descricao: "Existe um template formalizado para post-mortem de incidentes."
            obrigatorio: true
          - descricao: "O registo de incidentes inclui o estado de cada ação de melhoria."
            obrigatorio: true
          - descricao: "Os incidentes são revistos em reunião de gestão periodicamente."
            obrigatorio: false
          - descricao: "São medidos indicadores de tempo de resolução de incidentes."
            obrigatorio: false
          - descricao: "As lições mais relevantes são partilhadas com outros departamentos."
            obrigatorio: false
      3:
        descricao: "Processo formal de post-mortem com relatório e plano de ação."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []
      4:
        descricao: "Lições integradas em métricas de maturidade, acompanhamento de ações."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []
      5:
        descricao: "Melhoria contínua automatizada, correlação com threat intelligence global."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []
