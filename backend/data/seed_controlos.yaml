  - codigo: RC.RP-02
    dominio: RC
    titulo: Backup e restauro de dados
    descricao_simples: >
      Os dados críticos da organização são copiados regularmente
      e é possível restaurá-los quando necessário.
    critico: true
    nivel_minimo_base: 2
    nivel_minimo_importante: 3
    nivel_minimo_essencial: 4
    ordem: 2
    mapeamento:
      iso27001: ["A.12.3"]
      nist_csf: ["RC.RP-1", "PR.IP-4"]
      dl125: ["Art.21º(2)(c)"]
    niveis:
      1:
        descricao: "Sem backups regulares. Dados podem ser perdidos permanentemente."
        guia_implementacao:
          - "1. Identificar todos os dados críticos que devem ser incluídos nos backups."
          - "2. Implementar backup automático com frequência adequada (diário para dados críticos)."
          - "3. Guardar pelo menos uma cópia offline ou offsite."
          - "4. Testar o restauro mensalmente — não basta ter o backup, tem de funcionar."
          - "5. Guardar backups por pelo menos 30 dias para permitir recuperação de ransomware."
        exemplos_evidencias:
          - "Configuração de backup automático com evidência de execução"
          - "Registo de teste de restauro bem-sucedido"
          - "Screenshot de backups armazenados offsite ou offline"
        checks:
          - descricao: "Os dados críticos da organização têm backup automático configurado."
            obrigatorio: true
          - descricao: "Existe pelo menos uma cópia de backup guardada em local diferente do servidor principal."
            obrigatorio: true
          - descricao: "O restauro dos backups foi testado nos últimos 90 dias."
            obrigatorio: true
          - descricao: "Os backups são retidos por pelo menos 30 dias."
            obrigatorio: false
          - descricao: "Existe alguém responsável por verificar se os backups foram executados com sucesso."
            obrigatorio: false
      2:
        descricao: "Backups manuais ocasionais, sem teste de restauro."
        guia_implementacao:
          - "1. Automatizar os backups e configurar notificações de falha."
          - "2. Implementar a regra 3-2-1 (3 cópias, 2 suportes diferentes, 1 offsite)."
          - "3. Definir e testar o processo de restauro regular (pelo menos mensal)."
          - "4. Garantir retenção mínima de 30 dias (proteção contra ransomware)."
          - "5. Encriptar os backups e documentar o processo de recuperação de chaves."
        exemplos_evidencias:
          - "Configuração de backup automático com alertas de falha"
          - "Registo mensal de teste de restauro com resultado documentado"
          - "Configuração de retenção de backups por pelo menos 30 dias"
        checks:
          - descricao: "Os backups são automáticos com alertas de falha configurados."
            obrigatorio: true
          - descricao: "A regra 3-2-1 de backups está implementada."
            obrigatorio: false
          - descricao: "São realizados testes de restauro mensalmente com registo do resultado."
            obrigatorio: true
          - descricao: "Os backups estão encriptados."
            obrigatorio: false
          - descricao: "Os backups são retidos por pelo menos 30 dias."
            obrigatorio: true
      3:
        descricao: "Backup automático diário, teste de restauro mensal, cópia offsite."
        guia_implementacao: []
        exemplos_evidencias: []
        checks: []
      4:
