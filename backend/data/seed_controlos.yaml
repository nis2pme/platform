      1:
        descricao: "Sem plano. Resposta ad hoc, caótica."
        guia_implementacao:
          - "1. Criar um plano simples de resposta a incidentes (1-2 páginas)."
          - "2. Incluir: tipos de incidentes, quem contactar, passos imediatos, comunicação."
          - "3. Definir papéis e responsabilidades (quem faz o quê)."
          - "4. Incluir procedimento de notificação às autoridades (CNCS/CNPD se aplicável)."
          - "5. Testar o plano com um exercício de mesa (tabletop exercise) anual."
