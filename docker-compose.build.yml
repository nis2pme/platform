# ============================================================
# NIS2PME — On-Prem Deployment (BUILD FROM SOURCE)
#
# For maintainers / advanced users who want to build the images
# locally instead of pulling them from GHCR.
#
#   docker compose -f docker-compose.build.yml up -d --build
#
# The default docker-compose.yml pulls pre-built images from GHCR
# and is what end users should use.
# ============================================================

services:

  db:
    image: postgres:16-alpine
    container_name: nis2pme_db
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    mem_limit: ${DB_MEM_LIMIT:-1g}
    cpus: ${DB_CPUS:-1.0}
    pids_limit: 512
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_USER: ${DB_USER:-nis2pme}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Definir DB_PASSWORD no ficheiro .env}
      POSTGRES_DB: ${DB_NAME:-nis2pme}
    volumes:
      - nis2pme_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nis2pme -d nis2pme"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - nis2pme_net

  backend:
    build:
      # Context is the docker/ root so the frameworks/ folder is baked into the image
      context: .
      dockerfile: backend/Dockerfile
    image: ghcr.io/nis2pme/backend:latest
    container_name: nis2pme_backend
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    # DAC_OVERRIDE: o .env do host é montado abaixo para o wizard poder gravar config
    # SMTP; o dono/permissões desse ficheiro no host raramente coincidem com o uid
    # 10001 do container (ex.: criado por root com chmod 600) — sem esta cap, a app
    # fica sem conseguir ler nem escrever /app/.env ("Permission denied").
    cap_add: [DAC_OVERRIDE]
    mem_limit: ${BACKEND_MEM_LIMIT:-1g}
    cpus: ${BACKEND_CPUS:-1.0}
    pids_limit: 512
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    environment:
      # Estas variáveis sobrepõem o .env — não alterar aqui
      DATABASE_URL: postgresql://${DB_USER:-nis2pme}:${DB_PASSWORD}@db:5432/${DB_NAME:-nis2pme}
      DEPLOYMENT_MODE: onprem
      FRAMEWORKS_DIR: /app/frameworks
      NGINX_CONFIG_DIR: /app/nginx_config
      # CORS_ORIGINS não definido aqui: auto-derivado de APP_URL pelo backend
    volumes:
      - nis2pme_uploads:/app/uploads
      # As definições de frameworks são incorporadas na imagem — sem bind-mount.
      - nis2pme_nginx:/app/nginx_config
      # Secrets auto-gerados na primeira execução (JWT keys, Fernet keys)
      - nis2pme_data:/app/data
      # Permite ao wizard de setup gravar configuração SMTP no .env do host
      - ./.env:/app/.env
      # Certificado TLS próprio (opcional — preenchido pelo installer quando TLS_MODE=custom)
      - ./certs:/app/host_certs:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 240s
    networks:
      - nis2pme_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ghcr.io/nis2pme/frontend:latest
    container_name: nis2pme_frontend
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, NET_BIND_SERVICE]
    mem_limit: ${FRONTEND_MEM_LIMIT:-128m}
    cpus: ${FRONTEND_CPUS:-0.5}
    pids_limit: 256
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      # Passar (não decidir): mesma flag/valor que o backend. O nginx aplica o real_ip no único
      # ponto onde o IP do peer ainda é fidedigno; a decisão de confiar no CF é única (backend).
      # Default false → on-prem direto não confia no CF-Connecting-IP (evita spoofing, CWE-348).
      TRUST_CLOUDFLARE_HEADERS: ${TRUST_CLOUDFLARE_HEADERS:-false}
      REAL_IP_FROM: ${REAL_IP_FROM:-172.16.0.0/12}
    ports:
      # FRONTEND_BIND_IP: atrás de Cloudflare Tunnel/reverse-proxy → 127.0.0.1 (origem fechada à
      # internet); on-prem com acesso direto → 0.0.0.0 (default, não quebra instalações existentes).
      # FRONTEND_BIND_IP6: par IPv6 (default :: = todos). Atrás de túnel cujo "localhost" resolve
      # para ::1, é preciso ouvir TAMBÉM em loopback v6 — senão o túnel não alcança a app.
      - "${FRONTEND_BIND_IP:-0.0.0.0}:${PORT:-80}:80"
      - "${FRONTEND_BIND_IP:-0.0.0.0}:${HTTPS_PORT:-443}:443"
      - "${FRONTEND_BIND_IP6:-::}:${PORT:-80}:80"
      - "${FRONTEND_BIND_IP6:-::}:${HTTPS_PORT:-443}:443"
    volumes:
      - nis2pme_nginx:/run/nginx_config
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - nis2pme_net

volumes:
  nis2pme_pgdata:
  nis2pme_uploads:
  nis2pme_nginx:
  nis2pme_data:

networks:
  nis2pme_net:
    driver: bridge
