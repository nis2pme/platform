# ============================================================
# NIS2PME — On-Prem Deployment (GHCR — pre-built images)
#
# This is the default end-user deployment. It pulls the
# pre-built images from GitHub Container Registry — no build.
#
# Easiest:   ./start_nis2pme.sh   (generates .env, pulls, starts)
# Manual:    create a .env (APP_URL + DB_PASSWORD) then:
#               docker compose up -d
#
# To build the images from source instead, use:
#               docker compose -f docker-compose.build.yml up -d --build
#
# Pin a version by replacing ":latest" with a tag, e.g. ":0.2".
# ============================================================

services:

  db:
    image: postgres:16-alpine
    container_name: nis2pme_db
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_USER: ${DB_USER:-nis2pme}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Define DB_PASSWORD in the .env file}
      POSTGRES_DB: ${DB_NAME:-nis2pme}
    volumes:
      - nis2pme_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nis2pme -d nis2pme"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - nis2pme_net

  backend:
    image: ghcr.io/nis2pme/backend:latest
    container_name: nis2pme_backend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    environment:
      # These override the .env — do not change here
      DATABASE_URL: postgresql://${DB_USER:-nis2pme}:${DB_PASSWORD}@db:5432/${DB_NAME:-nis2pme}
      DEPLOYMENT_MODE: onprem
      FRAMEWORKS_DIR: /app/frameworks
      NGINX_CONFIG_DIR: /app/nginx_config
      # CORS_ORIGINS not set here: auto-derived from APP_URL by the backend
    volumes:
      - nis2pme_uploads:/app/uploads
      # Control-framework definitions (QNRCS 2026) are baked into the image — no mount.
      - nis2pme_nginx:/app/nginx_config
      # Secrets auto-generated on first run (JWT keys, Fernet keys)
      - nis2pme_data:/app/data
      # Lets the setup wizard write SMTP config back to the host .env
      - ./.env:/app/.env
      # Custom TLS certificate (optional — populated by the installer when TLS_MODE=custom)
      - ./certs:/app/host_certs:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 240s
    networks:
      - nis2pme_net

  frontend:
    image: ghcr.io/nis2pme/frontend:latest
    container_name: nis2pme_frontend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - nis2pme_nginx:/run/nginx_config
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - nis2pme_net

volumes:
  nis2pme_pgdata:
  nis2pme_uploads:
  nis2pme_nginx:
  nis2pme_data:

networks:
  nis2pme_net:
    driver: bridge
