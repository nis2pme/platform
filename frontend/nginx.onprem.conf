# NIS2PME — Nginx config para container Docker (on-prem)
#
# NOTA: Em nginx, add_header num bloco location filho cancela todos os
# add_header do bloco pai. Por isso os headers de segurança são
# repetidos em cada location que define os seus próprios add_header.
# Referência: https://nginx.org/en/docs/http/ngx_http_headers_module.html

server {
    listen 80;
    server_name _;

    # Ficheiros estáticos do frontend compilado (copiados na imagem Docker)
    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # Security headers — nível server (herdados por location / )
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP para a SPA Vue.js:
    #   - script-src 'self': sem inline scripts (PrimeVue não precisa)
    #   - style-src 'unsafe-inline': necessário para PrimeVue (estilos dinâmicos)
    #   - img-src data: e blob:: avatares inline e pré-visualização de evidências
    #   - connect-src 'self': chamadas AJAX apenas à origem própria
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # Proxy para o backend FastAPI (nome do serviço Docker)
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        # Tamanho máximo de body para uploads de evidências
        client_max_body_size 15M;
        # Não adicionar headers CSP aqui — o FastAPI middleware já os define
    }

    # SPA fallback — qualquer rota desconhecida serve o index.html (Vue Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache longo para assets estáticos com hash no nome
    # NOTA: add_header neste bloco repete os headers do pai (obrigatório por design do nginx)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        # Repetição obrigatória dos security headers (nginx cancela add_header do pai)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        access_log off;
    }

    # Bloquear acesso a ficheiros ocultos (ex: .env, .git)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
